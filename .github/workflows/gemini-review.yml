name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Gemini Review
        uses: google-gemini/gemini-github-action@v1.1.0 # 信頼性の高い公式・準公式Actionを使用
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: 'gemini-1.5-flash' # 高速で安価なモデル。精度優先なら pro に変更
          system_instruction: |
            あなたはシニアエンジニアとして、プルリクエストのコードレビューを行ってください。
            以下の点に注目して日本語で回答してください：
            1. バグや潜在的なエラーの指摘
            2. コードの可読性と保守性の向上案
            3. セキュリティ上の懸念点
            4. 良い実装については褒める
